name: Update MLIT News

on:
  schedule:
    # Every 6 hours (JST: 0時, 6時, 12時, 18時)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: '全件再取得（既存データを上書き）'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Clear existing data (force refresh)
        if: ${{ inputs.force_refresh == true }}
        run: echo '{"last_updated":"","items":[]}' > data/news.json

      - name: Fetch and summarize MLIT news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No new data – nothing to commit."
          else
            git commit -m "chore: update MLIT news data [skip ci]"
            git push origin main
          fi
