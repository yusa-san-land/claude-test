<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国土交通省 最新動向ダッシュボード</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-logo">
                <span class="ministry-icon">🏛</span>
                <div>
                    <h1>国土交通省</h1>
                    <p class="subtitle">最新動向ダッシュボード</p>
                </div>
            </div>
            <div class="header-actions">
                <span id="lastUpdated" class="last-updated">読み込み中...</span>
                <button class="refresh-btn" onclick="loadNews()">↻ 更新</button>
            </div>
        </div>
    </header>

    <main>
        <div class="controls">
            <input
                type="text"
                id="searchInput"
                placeholder="キーワードで検索..."
                class="search-input"
                oninput="renderNews()"
                aria-label="ニュース検索"
            >
            <div class="category-filters" id="categoryFilters">
                <button class="filter-btn active" onclick="filterByCategory(null, this)">すべて</button>
            </div>
        </div>

        <div id="newsContainer" class="news-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>情報を読み込み中...</p>
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display:none">
            <p>🔍 該当するニュースが見つかりませんでした</p>
        </div>
    </main>

    <footer>
        <p>データは<a href="https://www.mlit.go.jp/" target="_blank" rel="noopener">国土交通省公式サイト</a>から自動収集・AI要約しています。</p>
        <p>最新・正確な情報は公式サイトをご確認ください。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
