<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国土交通省ニュースウォッチャー</title>
  <meta name="description" content="国土交通省のプレスリリースを自動収集し、AI 要約付きで一覧表示するダッシュボードです。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">
        <span class="logo-mark" aria-hidden="true">🏛️</span>
        国土交通省ニュースウォッチャー
      </h1>
      <p class="site-tagline">
        国土交通省のプレスリリースを定期的に取得し、AI による要約とカテゴリ分類で素早く把握できます。
      </p>
      <div class="meta-bar">
        <span class="meta-item">
          <span class="meta-label">最終取得:</span>
          <span id="fetched-at" class="meta-value">読み込み中...</span>
        </span>
        <span class="meta-item">
          <span class="meta-label">件数:</span>
          <span id="count" class="meta-value">-</span>
        </span>
        <span class="meta-item">
          <span class="meta-label">情報源:</span>
          <a id="source-link" class="meta-value" href="https://www.mlit.go.jp/report/press/index.html" target="_blank" rel="noopener noreferrer">
            mlit.go.jp / 報道発表
          </a>
        </span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-label="絞り込み">
      <div class="control-group">
        <label for="search">キーワード検索</label>
        <input id="search" type="search" placeholder="例: 道路 / 港湾 / 観光" autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="category">カテゴリ</label>
        <select id="category">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="control-group">
        <label for="importance">重要度</label>
        <select id="importance">
          <option value="">すべて</option>
          <option value="high">重要のみ</option>
          <option value="normal">通常</option>
        </select>
      </div>
    </section>

    <section id="news-section" aria-live="polite">
      <div id="status" class="status">読み込み中...</div>
      <ul id="news-list" class="news-list"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        本サイトは国土交通省 (MLIT) の公開情報を参照しています。要約は AI による自動生成であり、
        正確性は保証されません。必ず一次情報源で内容をご確認ください。
      </p>
      <p>
        <a href="archive/calculator/index.html">以前の電卓アプリ (アーカイブ)</a>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
