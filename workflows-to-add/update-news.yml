name: Update MLIT News

on:
  schedule:
    # 毎日 00:00, 06:00, 12:00, 18:00 UTC (= 日本時間 09:00, 15:00, 21:00, 03:00)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch MLIT press releases
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Commit updates (if any)
        run: |
          if [[ -n "$(git status --porcelain data/news.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            git commit -m "chore(news): update MLIT press releases"
            git push
          else
            echo "No changes to data/news.json"
          fi
